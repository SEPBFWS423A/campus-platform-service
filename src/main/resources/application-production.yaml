spring:
  datasource:
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
app:
  frontend:
    url: ${FRONTEND_URL}
  jwt:
    secret: ${JWT_SECRET}
  initial:
    admin:
      email: ${ADMIN_EMAIL}
      password: ${ADMIN_PASSWORD}
    lecturer:
      email: ${LECTURER_EMAIL}
      password: ${LECTURER_PASSWORD}
    student:
      email: ${STUDENT_EMAIL}
      password: ${STUDENT_PASSWORD}
  resend:
    api:
      key: ${RESEND_API_KEY}