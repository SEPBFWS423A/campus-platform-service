spring:
  application:
    name: campus-platform-service
  profiles:
    active: local
  datasource:
    url: jdbc:h2:mem:testdb
    driverClassName: org.h2.Driver
    username:
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true
  mail:
    host: smtp.resend.com
    port: 465
    username: resend
    password:
    protocol: smtps
    from: noreply@campusplatform.de
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
app:
  frontend:
    url:
  jwt:
    secret:
  initial:
    admin:
      email:
      password:
  defaults:
    theme: theme-azure
    brightness: light
